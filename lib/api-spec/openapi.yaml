openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: restaurant-portal-auth
    description: Restaurant portal authentication
  - name: restaurant-portal-overview
    description: Restaurant portal overview dashboard
  - name: restaurant-portal-packages
    description: Restaurant portal meal packages
  - name: restaurant-portal-meals
    description: Restaurant portal meal/product CMS
  - name: restaurant-portal-upcoming
    description: Restaurant portal upcoming meals
  - name: restaurant-portal-cancellations
    description: Restaurant portal cancellations
  - name: restaurant-portal-settlements
    description: Restaurant portal settlements
  - name: restaurant-portal-reports
    description: Restaurant portal reports
  - name: restaurant-portal-redemptions
    description: Restaurant portal meal redemption ledger
  - name: student-auth
    description: Student phone OTP authentication
  - name: student-profile
    description: Student profile management
  - name: student-campuses
    description: Campus listing
  - name: student-restaurants
    description: Restaurant discovery and ratings
  - name: student-subscriptions
    description: Subscription purchase and management
  - name: student-orders
    description: Meal order management and cancellation
  - name: student-ledger
    description: Student transaction ledger

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /restaurant-portal/auth/login:
    post:
      operationId: restaurantPortalLogin
      tags: [restaurant-portal-auth]
      summary: Login to restaurant portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestaurantPortalLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantPortalLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: No restaurant portal access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /restaurant-portal/auth/me:
    get:
      operationId: restaurantPortalMe
      tags: [restaurant-portal-auth]
      summary: Get current authenticated restaurant portal user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantPortalUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /restaurant-portal/restaurants/{restaurantId}/overview:
    get:
      operationId: getRestaurantOverview
      tags: [restaurant-portal-overview]
      summary: Get restaurant overview dashboard metrics
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: mealSlot
          in: query
          schema:
            type: string
            enum: [all, lunch, dinner, both]
      responses:
        "200":
          description: Overview metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantOverview"

  /restaurant-portal/restaurants/{restaurantId}/packages:
    get:
      operationId: getRestaurantPackages
      tags: [restaurant-portal-packages]
      summary: Get all meal packages for a restaurant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [all, active, paused, archived]
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantPackage"
    post:
      operationId: createRestaurantPackage
      tags: [restaurant-portal-packages]
      summary: Create a new subscription package
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackageBody"
      responses:
        "201":
          description: Package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantPackage"

  /restaurant-portal/restaurants/{restaurantId}/packages/{packageId}:
    put:
      operationId: updateRestaurantPackage
      tags: [restaurant-portal-packages]
      summary: Update an existing subscription package
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: packageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackageBody"
      responses:
        "200":
          description: Package updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantPackage"
    delete:
      operationId: deleteRestaurantPackage
      tags: [restaurant-portal-packages]
      summary: Archive/delete a subscription package
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: packageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Package archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /restaurant-portal/restaurants/{restaurantId}/meals:
    get:
      operationId: getRestaurantMeals
      tags: [restaurant-portal-meals]
      summary: Get all meals/products for a restaurant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: isActive
          in: query
          schema:
            type: string
            enum: [all, true, false]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantMeal"
    post:
      operationId: createRestaurantMeal
      tags: [restaurant-portal-meals]
      summary: Create a new meal/product
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealBody"
      responses:
        "201":
          description: Meal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantMeal"

  /restaurant-portal/restaurants/{restaurantId}/meals/{mealId}:
    put:
      operationId: updateRestaurantMeal
      tags: [restaurant-portal-meals]
      summary: Update an existing meal/product
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: mealId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealBody"
      responses:
        "200":
          description: Meal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantMeal"
    delete:
      operationId: deleteRestaurantMeal
      tags: [restaurant-portal-meals]
      summary: Delete a meal/product
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: mealId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meal deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /restaurant-portal/restaurants/{restaurantId}/upcoming-meals:
    get:
      operationId: getRestaurantUpcomingMeals
      tags: [restaurant-portal-upcoming]
      summary: Get upcoming meals for preparation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: mealSlot
          in: query
          schema:
            type: string
            enum: [all, lunch, dinner]
        - name: status
          in: query
          schema:
            type: string
            enum: [all, scheduled, locked, preparing, delivered, cancelled]
      responses:
        "200":
          description: Upcoming meals data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpcomingMealsData"

  /restaurant-portal/restaurants/{restaurantId}/upcoming-meals/counts:
    get:
      operationId: getRestaurantMealCounts
      tags: [restaurant-portal-upcoming]
      summary: Get meal count summary for a date range
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Meal counts by date and slot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyMealCount"

  /restaurant-portal/restaurants/{restaurantId}/orders/{orderId}/status:
    patch:
      operationId: updateMealOrderStatus
      tags: [restaurant-portal-upcoming]
      summary: Update meal order status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealOrderDetail"

  /restaurant-portal/restaurants/{restaurantId}/cancellations:
    get:
      operationId: getRestaurantCancellations
      tags: [restaurant-portal-cancellations]
      summary: Get cancellations for a restaurant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: mealSlot
          in: query
          schema:
            type: string
            enum: [all, lunch, dinner]
        - name: type
          in: query
          schema:
            type: string
            enum: [all, free_cancellation, late_cancellation, no_show, restaurant_cancelled]
      responses:
        "200":
          description: Cancellations data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancellationsData"

  /restaurant-portal/restaurants/{restaurantId}/settlements:
    get:
      operationId: getRestaurantSettlements
      tags: [restaurant-portal-settlements]
      summary: Get settlement reports for a restaurant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, payable, processing, paid, on_hold]
      responses:
        "200":
          description: Settlements data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementsData"

  /restaurant-portal/restaurants/{restaurantId}/redemptions:
    get:
      operationId: getRestaurantRedemptions
      tags: [restaurant-portal-redemptions]
      summary: Get meal redemption ledger for a restaurant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: mealSlot
          in: query
          schema:
            type: string
            enum: [all, lunch, dinner]
        - name: status
          in: query
          schema:
            type: string
            enum: [all, scheduled, locked, delivered, cancelled, no_show]
        - name: search
          in: query
          schema:
            type: string
          description: Filter by student name or masked phone
        - name: preset
          in: query
          schema:
            type: string
            enum: [today, week, month, last30]
          description: Date preset (overrides dateFrom/dateTo)
        - name: exportAll
          in: query
          schema:
            type: boolean
          description: Return all matching rows (up to 1000) without pagination
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Meal redemption ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionLedgerData"

  /restaurant-portal/restaurants/{restaurantId}/reports/export:
    get:
      operationId: exportRestaurantReport
      tags: [restaurant-portal-reports]
      summary: Export a restaurant report as CSV
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RestaurantIdParam"
        - name: reportType
          in: query
          required: true
          schema:
            type: string
            enum: [daily_prep, weekly_settlement, monthly_subscribers, cancellations, package_performance]
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: mealSlot
          in: query
          schema:
            type: string
            enum: [all, lunch, dinner]
      responses:
        "200":
          description: CSV export data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportExport"

  # ─── Student API ─────────────────────────────────────────────────────────────

  /student/campuses:
    get:
      operationId: listCampuses
      tags: [student-campuses]
      summary: List all active campuses (public, no auth)
      responses:
        "200":
          description: Campus list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campus"

  /student/auth/send-otp:
    post:
      operationId: studentSendOtp
      tags: [student-auth]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentSendOtpBody"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  devNote:
                    type: string
        "400":
          description: Invalid phone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /student/auth/verify-otp:
    post:
      operationId: studentVerifyOtp
      tags: [student-auth]
      summary: Verify OTP and get auth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentVerifyOtpBody"
      responses:
        "200":
          description: Auth token and student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentAuthResponse"
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /student/profile:
    get:
      operationId: getStudentProfile
      tags: [student-profile]
      summary: Get own profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
    put:
      operationId: updateStudentProfile
      tags: [student-profile]
      summary: Update own profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"

  /student/restaurants:
    get:
      operationId: listStudentRestaurants
      tags: [student-restaurants]
      summary: List active restaurants
      security:
        - bearerAuth: []
      parameters:
        - name: campusId
          in: query
          schema:
            type: string
        - name: slot
          in: query
          schema:
            type: string
            enum: [lunch, dinner, both]
      responses:
        "200":
          description: Restaurant list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentRestaurant"

  /student/restaurants/{restaurantId}:
    get:
      operationId: getStudentRestaurant
      tags: [student-restaurants]
      summary: Get restaurant detail with packages and meals
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restaurant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentRestaurantDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /student/restaurants/{restaurantId}/rate:
    post:
      operationId: rateRestaurant
      tags: [student-restaurants]
      summary: Submit a rating for a restaurant
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateRestaurantBody"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  message:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /student/subscriptions:
    get:
      operationId: listStudentSubscriptions
      tags: [student-subscriptions]
      summary: List own subscriptions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentSubscription"
    post:
      operationId: createStudentSubscription
      tags: [student-subscriptions]
      summary: Purchase a subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionBody"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubscriptionResponse"
        "404":
          description: Restaurant or package not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /student/subscriptions/{subscriptionId}:
    get:
      operationId: getStudentSubscription
      tags: [student-subscriptions]
      summary: Get a subscription by ID
      security:
        - bearerAuth: []
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentSubscription"

  /student/subscriptions/{subscriptionId}/cancel:
    post:
      operationId: cancelStudentSubscription
      tags: [student-subscriptions]
      summary: Cancel a subscription
      security:
        - bearerAuth: []
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  refundAmount:
                    type: number
                required: [message, refundAmount]

  /student/subscriptions/{subscriptionId}/pause:
    post:
      operationId: pauseStudentSubscription
      tags: [student-subscriptions]
      summary: Pause a subscription for N days
      security:
        - bearerAuth: []
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pauseDays:
                  type: integer
                  minimum: 1
                  maximum: 30
              required: [pauseDays]
      responses:
        "200":
          description: Paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  pausedUntil:
                    type: string
                required: [message, pausedUntil]

  /student/orders:
    get:
      operationId: listStudentOrders
      tags: [student-orders]
      summary: List meal orders
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentOrder"

  /student/orders/{orderId}/cancel:
    post:
      operationId: cancelStudentOrder
      tags: [student-orders]
      summary: Cancel a single meal order
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancellation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelOrderResponse"
        "400":
          description: Cannot cancel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /student/ledger:
    get:
      operationId: listStudentLedger
      tags: [student-ledger]
      summary: Get student transaction ledger
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LedgerEntry"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RestaurantIdParam:
      name: restaurantId
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    RestaurantPortalLoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    RestaurantPortalLoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/RestaurantPortalUser"
      required:
        - token
        - user

